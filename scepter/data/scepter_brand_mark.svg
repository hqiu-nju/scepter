<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0C1A30"/>
      <stop offset="1" stop-color="#071020"/>
    </linearGradient>
  </defs>

  <rect x="3" y="3" width="58" height="58" rx="16" fill="url(#bg)"/>
  <rect x="3.5" y="3.5" width="57" height="57" rx="15.5"
        stroke="#38BDF8" stroke-opacity="0.20" stroke-width="0.7"/>

  <!-- Orbit arc -->
  <path d="M12 38C17 29 26 23.5 36 23.5C41.5 23.5 46 24.8 49.5 27"
        stroke="#38BDF8" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Earth horizon -->
  <path d="M14 45C18.5 51.5 25 55 32.5 55C38.5 55 43.5 53 48 49.5"
        stroke="#E2F1FF" stroke-width="3" stroke-linecap="round"/>
  <!-- Earth fill -->
  <path d="M14 45C18.5 51.5 25 55 32.5 55C38.5 55 43.5 53 48 49.5L50 58H10Z"
        fill="#0B2847" opacity="0.30"/>

  <!-- Crosshairs -->
  <line x1="16" y1="45" x2="48" y2="45" stroke="#E2F1FF"
        stroke-width="2" stroke-linecap="round" stroke-opacity="0.65"/>
  <line x1="32" y1="29" x2="32" y2="55" stroke="#E2F1FF"
        stroke-width="2" stroke-linecap="round" stroke-opacity="0.65"/>

  <!-- RAS telescope (simplified for 64px) -->
  <circle cx="32" cy="25.5" r="3.5" fill="#E2F1FF"/>
  <line x1="32" y1="27" x2="32" y2="30" stroke="#D6E4F0" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Satellite -->
  <g transform="translate(46 25) rotate(20)">
    <rect x="-3.5" y="-3.5" width="7" height="7" rx="1.8" fill="#38BDF8"/>
    <rect x="-9.5" y="-1.5" width="4" height="3" rx="0.8" fill="#E0F2FE"/>
    <rect x="5.5" y="-1.5" width="4" height="3" rx="0.8" fill="#E0F2FE"/>
  </g>
</svg>
