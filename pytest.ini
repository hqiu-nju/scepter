[pytest]
addopts = --basetemp=.pytest-tmp
markers =
    slow_leakage_math: exhaustive or structured leakage-math verification sweeps across channel subsets and reuse factors
    xdist_group(name): group tests for parallel execution (pytest-xdist)

# Parallel testing:
#   pytest -n auto --dist loadgroup    # auto-detect CPU count, group GPU tests
#   pytest -n 4 --dist loadgroup       # 4 workers
#   pytest                              # single-process (default)
#
# GPU tests are automatically grouped into the "gpu" xdist group by
# conftest.py so they run sequentially on one worker while CPU-only
# tests (leakage math, config parsing, etc.) spread across all workers.
